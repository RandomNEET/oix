  rsshub:
    # two ways to enable puppeteer:
    # * comment out marked lines, then use this image instead: diygod/rsshub:chromium-bundled
    # * (consumes more disk space and memory) leave everything unchanged
    image: diygod/rsshub
    container_name: rsshub
    restart: unless-stopped
    ports:
      - "10120:1200"
    environment:
      PROXY_URI: ${PROXY_BRIDGE}
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://redis:6379/"
      PUPPETEER_WS_ENDPOINT: "ws://browserless:3000" # marked
      PIXIV_REFRESHTOKEN: ${PIXIV_REFRESHTOKEN}
      PIXIV_BYPASS_CDN: 1
      PIXIV_BYPASS_HOSTNAME: "public-api.secure.pixiv.net"
      PIXIV_BYPASS_DOH: "https://1.1.1.1/dns-query"
      PIXIV_IMG_PROXY: "https://i.pixiv.re"
    depends_on:
      - redis
      - browserless # marked

  browserless: # marked
    image: browserless/chrome # marked
    container_name: browserless
    restart: unless-stopped
    ulimits: # marked
      core: # marked
        hard: 0 # marked
        soft: 0 # marked
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ${DOCKER_VOLUME}/rsshub/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

