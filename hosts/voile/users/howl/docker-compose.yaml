  speedtest-tracker:
    container_name: speedtest-tracker
    ports:
      - 10400:80
    environment:
      - HTTP_PROXY=${PROXY_BRIDGE}
      - HTTPS_PROXY=${PROXY_BRIDGE}
      - PUID=${UID}
      - PGID=${GID}
      - APP_KEY=${SPEEDTEST_TRACKER_APP_KEY}
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=speedtest-db
      - DB_PORT=3306
      - DB_DATABASE=${SPEEDTEST_TRACKER_DB_DATABASE}
      - DB_USERNAME=${SPEEDTEST_TRACKER_DB_USERNAME}
      - DB_PASSWORD=${SPEEDTEST_TRACKER_DB_PASSWORD}
      - SPEEDTEST_SCHEDULE="0 * * * *"
      - SPEEDTEST_SERVERS=
      - PRUNE_RESULTS_OLDER_THAN=
      - CHART_DATETIME_FORMAT=
      - DATETIME_FORMAT=
      - APP_TIMEZONE=Asia/Chongqing
      - DISPLAY_TIMEZONE=Asia/Chongqing
    volumes:
      - ${DOCKER_VOLUME}/speedtest-tracker/config:/config
      #- /path/to-custom-ssl-keys:/config/keys
    image: lscr.io/linuxserver/speedtest-tracker:latest
    restart: unless-stopped
    depends_on:
      - speedtest-db
    networks:
      - speedtest-net

  speedtest-db:
    image: mariadb:10
    container_name: speedtest-db
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=${SPEEDTEST_TRACKER_DB_DATABASE}
      - MARIADB_USER=${SPEEDTEST_TRACKER_DB_USERNAME}
      - MARIADB_PASSWORD=${SPEEDTEST_TRACKER_DB_PASSWORD}
      - MARIADB_RANDOM_ROOT_PASSWORD=true
    volumes:
      - ${DOCKER_VOLUME}/speedtest-tracker/speedtest-db:/var/lib/mysql
    networks:
      - speedtest-net

  mc:
    container_name: mc
    image: itzg/minecraft-server
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "11000:25565"
    environment:
      EULA: "TRUE"
      # ONLINE_MODE: false
      TYPE: PAPER
      VERSION: 1.20.1
      # HTTP_PROXY=${PROXY_BRIDGE}
      # HTTPS_PROXY=${PROXY_BRIDGE}
    volumes:
      # attach the relative directory 'data' to the container's /data path
      - ${DOCKER_VOLUME}/mc/paper-1.20.1-vanilla/data:/data

  natfrp-service:
    image: natfrp.com/launcher
    container_name: natfrp-service
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DOCKER_VOLUME}/natfrp-service:/run
    environment:
      NATFRP_TOKEN: ${NATFRP_TOKEN}
      NATFRP_REMOTE: ${NATFRP_REMOTE}
      TZ: Asia/Shanghai

  apcat:
    environment:
      - NAPCAT_UID=${UID}
      - NAPCAT_GID=${GID}
    network_mode: bridge
    ports:
      - 3000:3000
      - 3001:3001
      - 6099:6099
    volumes:
      - ${DOCKER_VOLUME}/napcat/config:/app/napcat/config
      - /home/howl/repo/qbot/downloads:/home/howl/repo/qbot/downloads
    container_name: napcat
    restart: unless-stopped
    image: mlikiowa/napcat-docker:latest

  your-spotify-server:
    container_name: your-spotify-server
    image: yooooomi/your_spotify_server
    restart: unless-stopped
    ports:
      - "10500:8080"
    links:
      - mongo
    depends_on:
      - mongo
    environment:
      API_ENDPOINT: https://spotifyapi.scaphium.xyz # This MUST be included as a valid URL in the spotify dashboard (see below)
      CLIENT_ENDPOINT: https://myspotify.scaphium.xyz
      SPOTIFY_PUBLIC: ${SPOTIFY_PUBLIC}
      SPOTIFY_SECRET: ${SPOTIFY_SECRET}
      TIMEZONE: Asia/Shanghai
  mongo:
    container_name: mongo
    image: mongo:6
    restart: unless-stopped
    volumes:
      - ${DOCKER_VOLUME}/your_spotify_db:/data/db

  your-spotify-client:
    container_name: your-spotify-client
    image: yooooomi/your_spotify_client
    restart: unless-stopped
    ports:
      - "10520:3000"
    environment:
      API_ENDPOINT: https://spotifyapi.scaphium.xyz

networks:
  # vaultwarden-net:
  #   driver: bridge
  speedtest-net:
    driver: bridge
