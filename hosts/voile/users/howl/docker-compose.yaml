  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "10090:8080"
    environment:
      - HTTP_PROXY=${PROXY_BRIDGE}
      - HTTPS_PROXY=${PROXY_BRIDGE}
      # - WATCHTOWER_NOTIFICATIONS=email
      # - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${EMAIL_FROM}
      # - WATCHTOWER_NOTIFICATION_EMAIL_TO=${EMAIL_TO}
      # - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${EMAIL_SERVER}
      # - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT}
      # - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      # - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSPORT}
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      - WATCHTOWER_HTTP_API_METRICS=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN}
      - TZ=Asia/Shanghai
      - WATCHTOWER_SCHEDULE=0 0 0 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_REMOVE_VOLUMES=true
      # - DOCKER_API_VERSION=1.52

